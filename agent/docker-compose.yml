services:
  postgres:
    image: postgres:16
    container_name: flowboard-postgres
    environment:
      POSTGRES_USER: flowboard
      POSTGRES_PASSWORD: flowboard
      POSTGRES_DB: flowboard
    ports:
      - "15432:5432"
    volumes:
      - flowboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowboard -d flowboard"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  flowboard_pgdata:
